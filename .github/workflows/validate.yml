name: Validate

# Auto-runs (push / pull_request) are temporarily disabled while GitHub
# Actions is billing-locked, so failed-start runs don't send email noise.
# Re-enable by restoring `push:` and `pull_request:` once billing is resolved.
on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m unittest discover -s tests -v
      - run: python scripts/sync_role_agents.py --check
      - run: python scripts/validate_repo.py
